<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submitted — Richardson Police Public Safety Cadets Unit #761</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #1a2744; --navy-deep: #0f1a30; --navy-light: #253758;
  --red: #c0392b; --red-glow: #e74c3c;
  --gold: #d4a952; --white: #ffffff; --text-muted: #8899b0;
  --green: #27ae60;
}
html { scroll-behavior: smooth; }
body { font-family: 'Barlow', sans-serif; background: var(--navy-deep); color: var(--white); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(15,26,48,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); }
.nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
.nav-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--white); }
.nav-brand img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); }
.nav-brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.nav-brand-dept { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); }
.nav-brand-unit { font-family: 'Barlow Condensed', sans-serif; font-weight: 400; font-size: 13px; letter-spacing: 1px; color: var(--text-muted); }
.nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }
.nav-links a { text-decoration: none; color: rgba(255,255,255,0.7); font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; border-radius: 6px; transition: all 0.3s ease; }
.nav-links a:hover { color: var(--white); background: rgba(255,255,255,0.08); }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
.hamburger span { width: 24px; height: 2px; background: var(--white); border-radius: 2px; }
.mobile-menu { display: none; position: fixed; top: 72px; left: 0; right: 0; background: rgba(15,26,48,0.98); backdrop-filter: blur(20px); padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.06); z-index: 999; }
.mobile-menu.open { display: block; }
.mobile-menu a { display: block; padding: 14px 0; color: rgba(255,255,255,0.7); text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.04); }
.mobile-menu a:last-child { border-bottom: none; }
.mobile-menu a:hover { color: var(--white); }

/* SUCCESS CONTENT */
.success-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 72px 24px 40px; position: relative; }
.success-bg { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(26,39,68,0.95) 0%, rgba(15,26,48,1) 70%), radial-gradient(circle at 50% 50%, rgba(39,174,96,0.06) 0%, transparent 50%); z-index: 0; }
.success-bg::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px; }

.success-card { position: relative; z-index: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 60px 48px; max-width: 480px; width: 100%; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 30px 80px rgba(0,0,0,0.3); animation: cardIn 0.6s ease forwards; }
@keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.success-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--green), var(--gold), var(--green)); border-radius: 20px 20px 0 0; }

.success-icon { width: 80px; height: 80px; margin: 0 auto 28px; background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: popIn 0.5s ease 0.3s both; }
@keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
.success-icon svg { color: var(--green); }

.checkmark-circle { stroke: var(--green); stroke-width: 2; fill: none; animation: drawCircle 0.6s ease 0.4s both; }
.checkmark-check { stroke: var(--green); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; animation: drawCheck 0.4s ease 0.8s both; }
@keyframes drawCircle { from { stroke-dasharray: 166; stroke-dashoffset: 166; } to { stroke-dasharray: 166; stroke-dashoffset: 0; } }
@keyframes drawCheck { from { stroke-dasharray: 48; stroke-dashoffset: 48; } to { stroke-dasharray: 48; stroke-dashoffset: 0; } }

.success-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 12px; color: var(--white); opacity: 0; animation: fadeUp 0.5s ease 0.6s forwards; }
.success-desc { font-weight: 300; font-size: 15px; color: var(--text-muted); line-height: 1.7; margin-bottom: 36px; opacity: 0; animation: fadeUp 0.5s ease 0.8s forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.success-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.5s ease 1s forwards; }
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 13px 28px; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: all 0.35s ease; cursor: pointer; border: none; }
.btn-primary { background: var(--red); color: var(--white); box-shadow: 0 4px 20px rgba(192,57,43,0.3); }
.btn-primary:hover { background: var(--red-glow); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(192,57,43,0.4); }
.btn-outline { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.2); }
.btn-outline:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); transform: translateY(-2px); }

@media (max-width: 900px) { .nav-links { display: none; } .hamburger { display: flex; } }
@media (max-width: 500px) { .success-card { padding: 48px 28px; } .success-actions { flex-direction: column; } .btn { width: 100%; justify-content: center; } }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">
      <img src="logo.png" alt="RPD Cadets Logo">
      <div class="nav-brand-text">
        <span class="nav-brand-dept">Richardson Police</span>
        <span class="nav-brand-unit">Public Safety Cadets — Unit #761</span>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="members.html">Members</a></li>
      <li><a href="time.html">Time Entry</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a><a href="members.html">Members</a><a href="time.html">Time Entry</a><a href="contact.html">Contact</a>
</div>

<div class="success-screen">
  <div class="success-bg"></div>
  <div class="success-card">
    <div class="success-icon">
      <svg width="40" height="40" viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
        <path class="checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>
    <h2 class="success-title">Submission Received</h2>
    <p class="success-desc">Your entry has been recorded successfully. Thank you for keeping your hours up to date.</p>
    <div class="success-actions">
      <a href="time.html" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Submit Another
      </a>
      <a href="index.html" class="btn btn-outline">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
    </div>
  </div>
</div>

<script>
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
document.querySelectorAll('.mobile-menu a').forEach(l => { l.addEventListener('click', () => mobileMenu.classList.remove('open')); });
</script>
</body>
</html>
